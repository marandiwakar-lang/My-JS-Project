name: Full Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0

        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}

          script: |
            set -e

            DOMAIN="myjavascriptapp.duckdns.org"
            EMAIL="marandiwakar@gmail.com"

            sudo apt update -y
            sudo apt install -y nginx curl git

            sudo -u devops bash << 'EOF'
            set -e

            export NVM_DIR="$HOME/.nvm"

            if [ ! -d "$NVM_DIR" ]; then
              curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.5/install.sh | bash
            fi

            source "$NVM_DIR/nvm.sh"

            nvm install 20
            nvm use 20

            npm install -g pm2

            if [ ! -d "/home/devops/My-JS-Project" ]; then
              git clone https://github.com/marandiwakar-lang/My-JS-Project.git /home/devops/My-JS-Project
            fi

            cd /home/devops/My-JS-Project

            git fetch origin
            git reset --hard origin/main

            # Clean install (secure)
            rm -rf node_modules
            npm ci --omit=dev

            # Fix vulnerabilities
            npm audit fix --force || true

            npm run build

            pm2 restart nextjs-app || pm2 start npm --name "nextjs-app" -- start
            pm2 save
            EOF

            sudo tee /etc/nginx/sites-available/default > /dev/null << NGINXEOF
            server {
                listen 80;
                server_name ${DOMAIN};

                location / {
                    proxy_pass http://localhost:3000;
                    proxy_set_header Host \$host;
                }

                location ~ /\.git {
                    deny all;
                }
            }
            NGINXEOF

            sudo nginx -t
            sudo systemctl restart nginx

            sudo apt install -y certbot python3-certbot-nginx

            sudo certbot --nginx -d "$DOMAIN" \
              --non-interactive \
              --agree-tos \
              -m "$EMAIL" \
              --redirect || true

            sudo systemctl reload nginx

            echo "Deployment completed successfully"
