name: Full Deployment
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            DOMAIN="myjavascriptapp.duckdns.org"
            EMAIL="marandiwakar@gmail.com"

            # ── Create devops user ────────────────────────────────────────────
            if ! id "devops" &>/dev/null; then
              sudo adduser --disabled-password --gecos "" devops
              sudo usermod -aG sudo devops
            fi
            sudo mkdir -p /home/devops/.ssh
            sudo cp ~/.ssh/authorized_keys /home/devops/.ssh/ || true
            sudo chown -R devops:devops /home/devops/.ssh
            sudo chmod 700 /home/devops/.ssh
            sudo chmod 600 /home/devops/.ssh/authorized_keys || true

            # ── SSH hardening ─────────────────────────────────────────────────
            sudo sed -i 's/^#\?PasswordAuthentication .*/PasswordAuthentication no/' /etc/ssh/sshd_config
            sudo sed -i 's/^#\?PermitRootLogin .*/PermitRootLogin no/' /etc/ssh/sshd_config
            sudo sed -i 's/^#\?MaxAuthTries .*/MaxAuthTries 3/' /etc/ssh/sshd_config
            sudo systemctl restart ssh || sudo systemctl restart sshd

            # ── Firewall ──────────────────────────────────────────────────────
            sudo ufw default deny incoming
            sudo ufw default allow outgoing
            sudo ufw allow 22
            sudo ufw allow 80
            sudo ufw allow 443
            sudo ufw --force enable

            # ── Install packages ──────────────────────────────────────────────
            sudo apt-get update -y
            sudo apt-get install -y nginx curl git certbot python3-certbot-nginx

            # ── App setup as devops user ──────────────────────────────────────
            sudo -u devops bash << 'APPEOF'
            set -e
            export NVM_DIR="$HOME/.nvm"
            if [ ! -d "$NVM_DIR" ]; then
              curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash
            fi
            source "$NVM_DIR/nvm.sh"
            nvm install 20
            nvm use 20
            if ! command -v pm2 >/dev/null; then
              npm install -g pm2
            fi
            if [ ! -d "/home/devops/My-JS-Project" ]; then
              git clone https://github.com/marandiwakar-lang/My-JS-Project.git /home/devops/My-JS-Project
            fi
            cd /home/devops/My-JS-Project
            git fetch origin
            git reset --hard origin/main
            npm install --legacy-peer-deps
            npm run build
            pm2 restart nextjs-app || pm2 start npm --name "nextjs-app" -- start
            pm2 save
            APPEOF

            # ── pm2 startup (must run as root) ────────────────────────────────
            NODE_BIN=$(sudo -u devops bash -c 'source $HOME/.nvm/nvm.sh && nvm which 20' | xargs dirname)
            sudo env PATH=$PATH:$NODE_BIN pm2 startup systemd -u devops --hp /home/devops || true

            # ── Nginx: HTTP-only config first (no SSL block) ──────────────────
            # This avoids nginx -t failing when certs don't exist yet.
            sudo mkdir -p /var/www/certbot
            sudo tee /etc/nginx/sites-available/default > /dev/null << NGINXEOF
            server {
                listen 80;
                server_name ${DOMAIN};

                # Allow certbot ACME challenge
                location /.well-known/acme-challenge/ {
                    root /var/www/certbot;
                }

                # Block sensitive paths
                location ~ /\.git {
                    deny all;
                    return 404;
                }
                location ~ /\.env {
                    deny all;
                    return 404;
                }

                location / {
                    proxy_pass http://localhost:3000;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade \$http_upgrade;
                    proxy_set_header Connection 'upgrade';
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-Proto \$scheme;
                }
            }
            NGINXEOF

            sudo nginx -t
            sudo systemctl restart nginx

            # ── SSL: certbot obtains cert and adds the 443 block itself ───────
            # On first run: obtains cert, rewrites nginx config with SSL + redirect.
            # On subsequent runs: renews if needed, skips reconfig if cert is valid.
            sudo certbot --nginx \
              -d "$DOMAIN" \
              --non-interactive \
              --agree-tos \
              -m "$EMAIL" \
              --redirect || true

            # ── Security headers: inject into the SSL server block ────────────
            # certbot writes the 443 block; we add headers after it runs.
            HEADERS='    server_tokens off;\n    add_header X-Frame-Options "DENY" always;\n    add_header X-Content-Type-Options "nosniff" always;\n    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;\n    add_header Content-Security-Policy "frame-ancestors '"'"'none'"'"'" always;'

            # Only add headers if they haven't been added yet
            if ! sudo grep -q "X-Frame-Options" /etc/nginx/sites-available/default; then
              sudo sed -i "/listen 443 ssl/a\\${HEADERS}" /etc/nginx/sites-available/default
            fi

            sudo nginx -t
            sudo systemctl reload nginx

            echo "✅ Deployment completed successfully"
