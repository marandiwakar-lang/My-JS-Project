name: Full Deployment
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            DOMAIN="myjavascriptapp.duckdns.org"
            EMAIL="marandiwakar@gmail.com"

            # Create user
            if ! id "devops" &>/dev/null; then
              sudo adduser --disabled-password --gecos "" devops
              sudo usermod -aG sudo devops
            fi
            sudo mkdir -p /home/devops/.ssh
            sudo cp ~/.ssh/authorized_keys /home/devops/.ssh/ || true
            sudo chown -R devops:devops /home/devops/.ssh
            sudo chmod 700 /home/devops/.ssh
            sudo chmod 600 /home/devops/.ssh/authorized_keys || true

            # SSH hardening
            sudo sed -i 's/^#\?PasswordAuthentication .*/PasswordAuthentication no/' /etc/ssh/sshd_config
            sudo sed -i 's/^#\?PermitRootLogin .*/PermitRootLogin no/' /etc/ssh/sshd_config
            sudo systemctl restart ssh || sudo systemctl restart sshd

            # Firewall
            sudo ufw allow 22
            sudo ufw allow 80
            sudo ufw allow 443
            sudo ufw --force enable

            # Install packages
            sudo apt update -y
            sudo apt install -y nginx curl git

            # -------------------------------------------------------
            # Create security headers snippet BEFORE Nginx config
            # This file survives Certbot rewrites because it is included
            # -------------------------------------------------------
            sudo mkdir -p /etc/nginx/snippets
            sudo tee /etc/nginx/snippets/security-headers.conf > /dev/null << 'SECEOF'
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; form-action 'self'; frame-ancestors 'none'; connect-src 'self';" always;
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
            SECEOF

            # App setup as devops user
            sudo -u devops bash << 'APPEOF'
            set -e
            export NVM_DIR="$HOME/.nvm"
            if [ ! -d "$NVM_DIR" ]; then
              curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.5/install.sh | bash
            fi
            source "$NVM_DIR/nvm.sh"
            nvm install 20
            nvm use 20
            if ! command -v pm2 >/dev/null; then
              npm install -g pm2
            fi
            if [ ! -d "/home/devops/My-JS-Project" ]; then
              git clone https://github.com/marandiwakar-lang/My-JS-Project.git /home/devops/My-JS-Project
            fi
            cd /home/devops/My-JS-Project
            git fetch origin
            git reset --hard origin/main
            npm install
            npm audit --audit-level=high || true
            npm run build
            pm2 restart nextjs-app || pm2 start npm --name "nextjs-app" -- start
            pm2 save
            APPEOF

            # pm2 startup must run as root with the devops node path
            NODE_BIN="/home/devops/.nvm/versions/node/v20.20.2/bin"
            sudo env PATH=$PATH:$NODE_BIN pm2 startup systemd -u devops --hp /home/devops || true

            # Nginx config - includes security headers snippet
            sudo tee /etc/nginx/sites-available/default > /dev/null << NGINXEOF
            server {
                listen 80;
                server_name ${DOMAIN};

                # Include security headers (survives Certbot rewrites)
                include snippets/security-headers.conf;

                location / {
                    proxy_pass http://localhost:3000;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade \$http_upgrade;
                    proxy_set_header Connection 'upgrade';
                    proxy_set_header Host \$host;
                }

                location ~ /\.git {
                    deny all;
                }
            }
            NGINXEOF

            sudo nginx -t
            sudo systemctl restart nginx

            # SSL - Certbot will add the HTTPS block but our snippet include stays
            sudo apt install -y certbot python3-certbot-nginx
            sudo certbot --nginx -d "$DOMAIN" \
              --non-interactive \
              --agree-tos \
              -m "$EMAIL" \
              --redirect || true

            # Re-add snippet include to HTTPS block if Certbot removed it
            if ! sudo grep -q "security-headers.conf" /etc/nginx/sites-available/default; then
              sudo sed -i '/listen 443/a\    include snippets/security-headers.conf;' /etc/nginx/sites-available/default
            fi

            sudo nginx -t
            sudo systemctl reload nginx

            # Verify headers are present
            echo "--- Verifying security headers ---"
            curl -sk -o /dev/null -D - https://${DOMAIN}/robots.txt | grep -i "content-security-policy\|x-frame-options\|x-content-type" || echo "WARNING: Headers not detected, check nginx config"

            echo "Deployment completed successfully"
